<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>offline — Team Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #666B43;
    --charcoal: #3A3A3A;
    --parchment:#E9E1D7;
    --ochre:    #C4956A;
    --parchment-dark: #D5CCBF;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--parchment);
    color: var(--charcoal);
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── Drop overlay ── */
  .drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(102,107,67,.1);
    border: 3px dashed var(--green);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay svg { width: 40px; height: 40px; fill: var(--green); opacity: .7; }
  .drop-overlay p {
    font-size: 15px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: .5px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--charcoal);
    color: var(--parchment);
    flex-shrink: 0;
  }
  .brand-mark {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .brand-mark .name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--parchment);
  }
  .brand-mark .tagline {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ochre);
    text-transform: lowercase;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-left: auto;
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.ai    { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--green);
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg.ai .bubble {
    background: #fff;
    color: var(--charcoal);
    border-bottom-left-radius: 2px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }

  /* image thumbnail in user bubble */
  .msg.user .bubble img.attach-thumb {
    max-width: 220px;
    max-height: 160px;
    border-radius: 3px;
    display: block;
    margin-bottom: 6px;
  }

  /* markdown-lite */
  .bubble strong { font-weight: 700; }
  .bubble em     { font-style: italic; }
  .bubble code   {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    background: var(--parchment);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .bubble pre {
    background: var(--parchment);
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    font-family: 'SF Mono', Consolas, monospace;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble hr { border: none; border-top: 1px solid var(--parchment-dark); margin: 10px 0; }
  .bubble ul, .bubble ol { padding-left: 18px; }
  .bubble li { margin: 3px 0; }
  .bubble h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; }
  .bubble table {
    border-collapse: collapse;
    font-size: 12px;
    margin: 8px 0;
    width: 100%;
    overflow-x: auto;
    display: block;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--parchment-dark);
    padding: 5px 8px;
    text-align: left;
  }
  .bubble th { background: var(--parchment); font-weight: 600; }

  /* typing indicator */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing .dot-anim {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--parchment-dark);
    animation: bounce 1.2s infinite;
  }
  .typing .dot-anim:nth-child(2) { animation-delay: .2s; }
  .typing .dot-anim:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 12px 16px 16px;
    background: var(--parchment);
    border-top: 1px solid var(--parchment-dark);
    flex-shrink: 0;
  }

  /* Attachment preview row */
  .attach-row {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: #fff;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--charcoal);
  }
  .attach-row.show { display: flex; }
  .attach-row img {
    width: 36px; height: 36px;
    object-fit: cover;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .attach-row .attach-icon { font-size: 18px; flex-shrink: 0; }
  .attach-row .attach-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .attach-row .attach-remove {
    cursor: pointer;
    color: #bbb;
    font-size: 15px;
    line-height: 1;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: color .15s;
  }
  .attach-row .attach-remove:hover { color: var(--charcoal); }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  /* Attach button */
  label.attach-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--parchment-dark);
    border-radius: 4px;
    transition: color .2s;
  }
  label.attach-btn:hover { color: var(--green); }
  label.attach-btn svg { width: 20px; height: 20px; fill: currentColor; }

  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: var(--charcoal);
    line-height: 1.5;
    min-height: 42px;
    max-height: 140px;
    overflow-y: auto;
    transition: border-color .2s;
  }
  textarea:focus { outline: none; border-color: var(--green); }
  textarea::placeholder { color: #aaa; }

  button#send {
    flex-shrink: 0;
    width: 42px; height: 42px;
    background: var(--green);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  button#send:hover  { background: #555940; }
  button#send:active { background: #484c37; }
  button#send svg    { width: 18px; height: 18px; fill: #fff; }
  button#send:disabled { background: var(--parchment-dark); cursor: default; }

  .hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    padding-left: 2px;
    letter-spacing: .3px;
  }

  /* ── Welcome ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--charcoal);
    opacity: .55;
    text-align: center;
    padding: 40px 20px;
  }
  .welcome svg { width: 36px; height: 36px; opacity: .6; }
  .welcome p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<!-- Drop overlay (full-screen) -->
<div class="drop-overlay" id="dropOverlay">
  <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
  <p>放開以附加檔案</p>
</div>

<div class="app">
  <header>
    <div class="brand-mark">
      <span class="name">offline</span>
      <span class="tagline">team assistant</span>
    </div>
    <span class="dot" id="statusDot" title="準備就緒"></span>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="currentColor"/>
      </svg>
      <p>嗨，我是離線助手，<br>關於社群行銷、電商、品牌策略、產品開發等工作任務，<br>我們一起完成吧！<br><span style="font-size:11px;opacity:.7">可拖入圖片、文字檔、或 Excel</span></p>
    </div>
  </div>

  <div class="input-area">
    <div class="attach-row" id="attachRow"></div>
    <div class="input-row">
      <label class="attach-btn" for="fileInput" title="附加檔案">
        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </label>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,.txt,.md,.csv,.json,.xlsx,.xls" style="display:none">
      <textarea id="input" placeholder="輸入你的工作需求…" rows="1"></textarea>
      <button id="send" title="送出">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter 送出 &nbsp;·&nbsp; Shift+Enter 換行 &nbsp;·&nbsp; 📎 可拖入圖片、文字檔、Excel（xlsx）</div>
  </div>
</div>

<script>
const chatEl     = document.getElementById('chat');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const welcomeEl  = document.getElementById('welcome');
const statusDot  = document.getElementById('statusDot');
const attachRow  = document.getElementById('attachRow');
const fileInput  = document.getElementById('fileInput');
const dropOverlay= document.getElementById('dropOverlay');

const messages = [];
let composing    = false;
let attachedFile = null; // { type:'image'|'text', name, data, mediaType? }

// ── Auto-resize textarea ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// ── IME composition tracking ──
inputEl.addEventListener('compositionstart', () => { composing = true; });
inputEl.addEventListener('compositionend',   () => { setTimeout(() => { composing = false; }, 0); });

// ── Enter to send ──
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !composing) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

// ── File input (click) ──
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file) handleFile(file);
  fileInput.value = '';
});

// ── Drag and drop ──
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('active');
});
document.addEventListener('dragleave', () => {
  dragCounter = Math.max(0, dragCounter - 1);
  if (dragCounter === 0) dropOverlay.classList.remove('active');
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// ── File handling ──
async function handleFile(file) {
  const MAX_SIZE = 2 * 1024 * 1024; // 2 MB
  if (file.size > MAX_SIZE) {
    alert(`檔案太大（${(file.size / 1024 / 1024).toFixed(1)} MB），請上傳 2 MB 以內的檔案`);
    return;
  }

  const IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
  const TEXT_EXTS   = ['.txt', '.md', '.csv', '.json'];
  const EXCEL_EXTS  = ['.xlsx', '.xls'];
  const fname = file.name.toLowerCase();
  const isImage = IMAGE_TYPES.includes(file.type);
  const isText  = TEXT_EXTS.some(ext => fname.endsWith(ext)) || file.type === 'text/plain';
  const isExcel = EXCEL_EXTS.some(ext => fname.endsWith(ext));

  if (!isImage && !isText && !isExcel) {
    alert('目前支援：圖片（JPG/PNG/GIF/WebP）、文字檔（txt/md/csv/json）、Excel（xlsx/xls）');
    return;
  }

  try {
    if (isImage) {
      const data = await readAsBase64(file);
      attachedFile = { type: 'image', name: file.name, data, mediaType: file.type };
      attachRow.innerHTML = `
        <img src="data:${file.type};base64,${data}" alt="preview">
        <span class="attach-name">${escHtml(file.name)}</span>
        <span class="attach-remove" title="移除">✕</span>`;
    } else if (isExcel) {
      const arrayBuffer = await file.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const MAX_PER_SHEET = 10000; // 每個工作表最多 10,000 字
      const MAX_TOTAL = 40000;     // 全部合計最多 40,000 字
      let text = '';
      let sheetsIncluded = 0;
      for (const sheetName of workbook.SheetNames) {
        const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
        if (!csv.trim()) continue;
        const chunk = csv.length > MAX_PER_SHEET
          ? csv.slice(0, MAX_PER_SHEET) + '\n（此工作表已截斷）'
          : csv;
        text += `=== ${sheetName} ===\n${chunk}\n\n`;
        sheetsIncluded++;
        if (text.length >= MAX_TOTAL) { text = text.slice(0, MAX_TOTAL) + '\n（已達總字數上限）'; break; }
      }
      const totalSheets = workbook.SheetNames.length;
      const truncated = sheetsIncluded < totalSheets || text.includes('截斷');
      attachedFile = { type: 'text', name: file.name, data: text, truncated };
      attachRow.innerHTML = `
        <span class="attach-icon">📊</span>
        <span class="attach-name">${escHtml(file.name)}（${totalSheets} 個工作表${truncated ? '，部分已截斷' : ''}）</span>
        <span class="attach-remove" title="移除">✕</span>`;
    } else {
      let text = await file.text();
      const MAX_CHARS = 12000;
      const truncated = text.length > MAX_CHARS;
      if (truncated) text = text.slice(0, MAX_CHARS);
      attachedFile = { type: 'text', name: file.name, data: text, truncated };
      attachRow.innerHTML = `
        <span class="attach-icon">📄</span>
        <span class="attach-name">${escHtml(file.name)}${truncated ? '（已截斷至 12000 字）' : ''}</span>
        <span class="attach-remove" title="移除">✕</span>`;
    }

    attachRow.classList.add('show');
    attachRow.querySelector('.attach-remove').addEventListener('click', clearAttachment);
    inputEl.focus();
  } catch (err) {
    alert('讀取檔案失敗：' + err.message);
  }
}

function readAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = (e) => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function clearAttachment() {
  attachedFile = null;
  attachRow.classList.remove('show');
  attachRow.innerHTML = '';
}

// ── Markdown-lite renderer ──
function renderMarkdown(text) {
  return text
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${escHtml(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-=]{3,}\s*$/gm, '<hr>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/^\|(.+)\|$/gm, row => {
      const cells = row.slice(1,-1).split('|').map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) return '';
      return `<tr>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g, m => `<table>${m}</table>`)
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Append message bubble ──
function appendMsg(role, content, imgInfo = null) {
  if (welcomeEl) welcomeEl.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    if (imgInfo) {
      const img = document.createElement('img');
      img.src = `data:${imgInfo.mediaType};base64,${imgInfo.data}`;
      img.className = 'attach-thumb';
      bubble.appendChild(img);
    }
    if (content) {
      const span = document.createElement('span');
      span.textContent = content;
      bubble.appendChild(span);
    }
  }

  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

// ── Typing indicator ──
function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = `<div class="bubble">
    <span class="dot-anim"></span>
    <span class="dot-anim"></span>
    <span class="dot-anim"></span>
  </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() {
  document.getElementById('typing')?.remove();
}

// ── Send ──
async function send() {
  const text = inputEl.value.trim();
  if ((!text && !attachedFile) || sendBtn.disabled) return;

  // Build API message content
  let userContent;
  let imgInfoForDisplay = null;

  if (attachedFile?.type === 'image') {
    imgInfoForDisplay = { data: attachedFile.data, mediaType: attachedFile.mediaType };
    userContent = [
      {
        type: 'image',
        source: { type: 'base64', media_type: attachedFile.mediaType, data: attachedFile.data }
      },
      { type: 'text', text: text || '請分析這張圖片。' }
    ];
  } else if (attachedFile?.type === 'text') {
    const fileBlock = `【附件：${attachedFile.name}】\n\`\`\`\n${attachedFile.data}\n\`\`\``;
    userContent = text ? `${fileBlock}\n\n${text}` : `${fileBlock}\n\n請分析這份文件。`;
  } else {
    userContent = text;
  }

  // Display user message
  appendMsg('user', text, imgInfoForDisplay);
  messages.push({ role: 'user', content: userContent });

  // Reset input state
  clearAttachment();
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  statusDot.style.background = 'var(--ochre)';
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    hideTyping();

    if (!res.ok) {
      const raw = await res.text();
      let msg;
      try { msg = JSON.parse(raw).error; } catch { msg = raw; }
      appendMsg('ai', `⚠️ HTTP ${res.status}: ${msg || raw}`);
      return;
    }

    const data = await res.json();
    const reply = data.content || '';
    appendMsg('ai', reply);
    messages.push({ role: 'assistant', content: reply });

    // 若本次觸發了遠端任務，啟動背景輪詢，完成後自動回報
    if (data.taskId) {
      pollTaskUntilDone(data.taskId);
    } else if (data.taskError) {
      appendMsg('ai', `⚠️ 任務送出失敗：${data.taskError}`);
    }

  } catch (e) {
    hideTyping();
    appendMsg('ai', '⚠️ 連線錯誤，請確認網路後再試。');
    console.error(e);
  } finally {
    sendBtn.disabled = false;
    statusDot.style.background = 'var(--green)';
    inputEl.focus();
  }
}

// ── 任務自動回報：輪詢 task-status 直到完成 ──
function pollTaskUntilDone(taskId) {
  const INTERVAL = 30 * 1000;   // 30 秒查一次
  const TIMEOUT  = 10 * 60 * 1000; // 最多等 10 分鐘
  const started  = Date.now();

  const timer = setInterval(async () => {
    // 超時保護
    if (Date.now() - started > TIMEOUT) {
      clearInterval(timer);
      return;
    }
    try {
      const res  = await fetch(`/.netlify/functions/task-status?id=${taskId}`);
      const data = await res.json();

      if (data.status === '完成' || data.status === '錯誤') {
        clearInterval(timer);
        let msg;
        if (data.status === '完成') {
          msg = `✅ 週安全庫存表已完成！\n\n${data.result || ''}`;
        } else {
          msg = `❌ 任務執行失敗：${data.result || '未知錯誤'}\n\n請確認本機 daemon 是否正在執行。`;
        }
        appendMsg('ai', msg);
        messages.push({ role: 'assistant', content: msg });
      }
    } catch (_) {
      // 網路異常時靜默忽略，等下次輪詢
    }
  }, INTERVAL);
}
