<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>offline — Team Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #666B43;
    --charcoal: #3A3A3A;
    --parchment:#E9E1D7;
    --ochre:    #C4956A;
    --parchment-dark: #D5CCBF;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--parchment);
    color: var(--charcoal);
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--charcoal);
    color: var(--parchment);
    flex-shrink: 0;
  }
  .brand-mark {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .brand-mark .name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--parchment);
  }
  .brand-mark .tagline {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ochre);
    text-transform: lowercase;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-left: auto;
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.ai    { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--green);
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg.ai .bubble {
    background: #fff;
    color: var(--charcoal);
    border-bottom-left-radius: 2px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }

  /* markdown-lite */
  .bubble strong { font-weight: 700; }
  .bubble em     { font-style: italic; }
  .bubble code   {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    background: var(--parchment);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .bubble pre {
    background: var(--parchment);
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    font-family: 'SF Mono', Consolas, monospace;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble hr { border: none; border-top: 1px solid var(--parchment-dark); margin: 10px 0; }
  .bubble ul, .bubble ol { padding-left: 18px; }
  .bubble li { margin: 3px 0; }
  .bubble h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; }
  .bubble table {
    border-collapse: collapse;
    font-size: 12px;
    margin: 8px 0;
    width: 100%;
    overflow-x: auto;
    display: block;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--parchment-dark);
    padding: 5px 8px;
    text-align: left;
  }
  .bubble th { background: var(--parchment); font-weight: 600; }

  /* typing indicator */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing .dot-anim {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--parchment-dark);
    animation: bounce 1.2s infinite;
  }
  .typing .dot-anim:nth-child(2) { animation-delay: .2s; }
  .typing .dot-anim:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 12px 16px 16px;
    background: var(--parchment);
    border-top: 1px solid var(--parchment-dark);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: var(--charcoal);
    line-height: 1.5;
    min-height: 42px;
    max-height: 140px;
    overflow-y: auto;
    transition: border-color .2s;
  }
  textarea:focus { outline: none; border-color: var(--green); }
  textarea::placeholder { color: #aaa; }

  button#send {
    flex-shrink: 0;
    width: 42px; height: 42px;
    background: var(--green);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  button#send:hover  { background: #555940; }
  button#send:active { background: #484c37; }
  button#send svg    { width: 18px; height: 18px; fill: #fff; }
  button#send:disabled { background: var(--parchment-dark); cursor: default; }

  .hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    padding-left: 2px;
    letter-spacing: .3px;
  }

  /* ── Welcome ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 8px;
    color: var(--charcoal);
    opacity: .55;
    text-align: center;
    padding: 40px 20px;
  }
  .welcome svg { width: 36px; height: 36px; opacity: .6; }
  .welcome p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand-mark">
      <span class="name">offline</span>
      <span class="tagline">team assistant</span>
    </div>
    <span class="dot" id="statusDot" title="準備就緒"></span>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="currentColor"/>
      </svg>
      <p>社群行銷、電商、品牌策略、產品開發<br>把你的工作丟給我。</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="輸入你的工作需求…" rows="1"></textarea>
      <button id="send" title="送出">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter 送出 &nbsp;·&nbsp; Shift+Enter 換行</div>
  </div>
</div>

<script>
const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('send');
const welcomeEl= document.getElementById('welcome');
const statusDot= document.getElementById('statusDot');

const messages = [];  // conversation history
let composing  = false;

// ── Auto-resize textarea ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// ── IME composition tracking (中文輸入法) ──
inputEl.addEventListener('compositionstart', () => { composing = true; });
inputEl.addEventListener('compositionend',   () => { setTimeout(() => { composing = false; }, 0); });

// ── Enter to send ──
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !composing) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

// ── Markdown-lite renderer ──
function renderMarkdown(text) {
  return text
    // code blocks
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${escHtml(c.trim())}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // hr (--- or ===)
    .replace(/^[-=]{3,}\s*$/gm, '<hr>')
    // h3
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    // bullet
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    // numbered
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // wrap consecutive <li> in <ul>
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    // simple table rows
    .replace(/^\|(.+)\|$/gm, row => {
      const cells = row.slice(1,-1).split('|').map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) return '';
      const tag = cells[0] && row.includes('---') ? 'th' : 'td';
      return `<tr>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;
    })
    // wrap table rows
    .replace(/(<tr>.*<\/tr>\n?)+/g, m => `<table>${m}</table>`)
    // line breaks
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Append message bubble ──
function appendMsg(role, content) {
  if (welcomeEl) welcomeEl.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'ai') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

// ── Typing indicator ──
function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = `<div class="bubble">
    <span class="dot-anim"></span>
    <span class="dot-anim"></span>
    <span class="dot-anim"></span>
  </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() {
  document.getElementById('typing')?.remove();
}

// ── Send ──
async function send() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  statusDot.style.background = 'var(--ochre)';
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    hideTyping();

    if (!res.ok) {
      const raw = await res.text();
      let msg;
      try { msg = JSON.parse(raw).error; } catch { msg = raw; }
      appendMsg('ai', `⚠️ HTTP ${res.status}: ${msg || raw}`);
      return;
    }

    const data = await res.json();
    const reply = data.content || '';
    appendMsg('ai', reply);
    messages.push({ role: 'assistant', content: reply });

  } catch (e) {
    hideTyping();
    appendMsg('ai', '⚠️ 連線錯誤，請確認網路後再試。');
    console.error(e);
  } finally {
    sendBtn.disabled = false;
    statusDot.style.background = 'var(--green)';
    inputEl.focus();
  }
}
</script>
</body>
</html>
